<html>
<head>
  <title>AppSchema</title>
</head>
<body style="font-size: 20px;">
  <div style="width: auto; margin: 0">
    <div style="margin-top: 100px;">
    <button id="openapp" style="padding: 30px; background-color: #eee; ">Open AppSchema</button>
    </div>
    
    <div style="margin-top: 100px;">
      <a href="https://enix223.github.io/openapp" style="padding: 30px; background-color: #eee; ">Open appschema</a>
    </div>
  </div>
  <script>
    var btn_open = document.getElementById("openapp");
    btn_open.addEventListener('click', function() {
    btn_open.src = 'https://enix223.github.io/openapp';
    setTimeout(function() {
        location.href = 'https://enix223.github.io/openapp';
      }, 1000);
    }, false);
  </script>
</body>
</html>
