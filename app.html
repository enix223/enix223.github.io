<html>
<head>
  <title>AppSchema</title>
</head>
<body style="font-size: 20px;">
  <div style="width: 100%;">
    <div style="width: auto; margin: 0">
      <div style="margin-top: 50px;">
      <button id="openapp" style="padding: 30px; background-color: #1abc9c; font-size: 16px; color: white">Open AppSchema</button>
      </div>
      
      <div style="margin-top: 50px;">
        <a href="appschema://urlquery/home?name=Apple&site=GD&page=1&pageSize=2" style="padding: 30px; background-color: #2ecc71; font-size: 16px; color: white">Open appschema</a>
      </div>
    </div>
  </div>
  <script>
    var btn_open = document.getElementById("openapp");
    btn_open.addEventListener('click', function() {
    btn_open.src = 'https://enix223.github.io/openapp';
    setTimeout(function() {
        location.href = 'https://enix223.github.io/openapp';
      }, 1000);
    }, false);
  </script>
</body>
