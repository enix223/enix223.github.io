<html>
<head>
  <title>AppSchema</title>
</head>
<body>
  <div>
  <button id="openapp">Open AppSchema</button>
  </div>
  
  <div>
    <a href="https://enix223.github.io/openapp">Open appschema</a>
  </div>
  <script>
    var btn_open = document.getElementById("openapp");
    btn_open.addEventListener('click', function() {
    btn_open.src = 'https://enix223.github.io/openapp';
    setTimeout(function() {
        location.href = 'https://enix223.github.io/openapp';
      }, 1000);
    }, false);
  </script>
</body>
</html>
